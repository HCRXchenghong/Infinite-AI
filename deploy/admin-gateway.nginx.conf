events {}

http {
  map "$http_x_infinite_api:$http_accept" $admin_origin {
    default http://web:1002;
    "~^1:" http://bff:1002;
    "~*^[^:]*:.*application/json" http://bff:1002;
  }

  resolver 127.0.0.11 ipv6=off valid=10s;

  server {
    listen 1003;
    server_name _;

    set $web_origin http://web:1002;
    set $api_origin http://bff:1002;

    location = / {
      return 302 /admin/login;
    }

    location /chat/ {
      proxy_pass $api_origin$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/ {
      proxy_pass $api_origin$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
      proxy_pass $api_origin$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /developer/ {
      proxy_pass $api_origin$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /billing/ {
      proxy_pass $api_origin$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redeem/ {
      proxy_pass $api_origin$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /downloads/ {
      proxy_pass $api_origin$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /user/ {
      proxy_pass $api_origin$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /webhooks/ {
      proxy_pass $api_origin$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
      proxy_pass $web_origin$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin/ {
      proxy_pass $web_origin$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/admin/(dashboard|users|models|after-sales|api-stats|system-logs|member-stats|membership|finance|finance-management|settings|login)/?$ {
      proxy_pass $admin_origin$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/admin/(users/[^/]+|models(/[^/]+)?|service-alerts|service-alerts/[^/]+/(read|resolve)|finance/ifpay|settings/(register|auth-security|email-gateway|email-gateway/test|sms-gateway|sms-gateway/test|model-membership-limits|model-context-limits|search-provider|infinite-code-quota|oauth(/[^/]+)?)|redeem/campaigns|invite-links(/[^/]+)?)$ {
      proxy_pass $api_origin$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass $web_origin$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
