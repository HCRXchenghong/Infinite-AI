services:
  user-gateway:
    image: nginx:1.27-alpine
    container_name: infinite-ai-user-gateway
    ports:
      - "1001:1001"
    volumes:
      - ./user-gateway.nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - bff

  admin-gateway:
    image: nginx:1.27-alpine
    container_name: infinite-ai-admin-gateway
    ports:
      - "1003:1003"
    volumes:
      - ./admin-gateway.nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - bff

  redeem-gateway:
    image: nginx:1.27-alpine
    container_name: infinite-ai-redeem-gateway
    ports:
      - "1004:1004"
    volumes:
      - ./redeem-gateway.nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - bff

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    container_name: infinite-ai-web
    expose:
      - "1002"

  bff:
    build:
      context: ..
      dockerfile: deploy/go-service.Dockerfile
      args:
        SERVICE_PATH: ./services/bff/cmd/server
    container_name: infinite-ai-api
    restart: unless-stopped
    environment:
      APP_ENV: development
      PUBLIC_BASE_URL: http://127.0.0.1:1001
      USER_BASE_URL: http://127.0.0.1:1001
      API_BASE_URL: http://127.0.0.1:1002
      ADMIN_BASE_URL: http://127.0.0.1:1003
      REDEEM_BASE_URL: http://127.0.0.1:1004
      SITE_BASE_URL: http://127.0.0.1:1000
      BFF_PORT: 1002
      CORE_PORT: 1004
      CORE_BASE_URL: http://core:1004
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/infinite_ai?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: infinite-ai
      SESSION_COOKIE_NAME: ia_session
      ADMIN_SESSION_COOKIE_NAME: ia_admin_session
      SESSION_TTL: 168h
      ADMIN_SESSION_TTL: 12h
      INTERNAL_JWT_SECRET: change-me-internal-jwt-secret
      COOKIE_HASH_SECRET: change-me-cookie-hash-secret
      MASTER_KEY: 0123456789abcdef0123456789abcdef
      DEFAULT_ADMIN_EMAIL: admin@infinite.local
      DEFAULT_ADMIN_PASSWORD: ChangeThisAdminPassword123!
      DEFAULT_ADMIN_DISPLAY_NAME: Admin Root
      DEFAULT_ADMIN_ROLE: super_admin
      DEFAULT_ADMIN_TOTP_SECRET: JBSWY3DPEHPK3PXP
      DEFAULT_CHAT_ROUTE: infinite-ai-standard
      DEEP_SEARCH_ROUTE: infinite-ai-pro
    depends_on:
      - postgres
      - redis
      - core
    ports:
      - "1002:1002"

  core:
    build:
      context: ..
      dockerfile: deploy/go-service.Dockerfile
      args:
        SERVICE_PATH: ./services/core/cmd/server
    container_name: infinite-ai-core
    restart: unless-stopped
    environment:
      APP_ENV: development
      PUBLIC_BASE_URL: http://127.0.0.1:1001
      USER_BASE_URL: http://127.0.0.1:1001
      API_BASE_URL: http://127.0.0.1:1002
      ADMIN_BASE_URL: http://127.0.0.1:1003
      REDEEM_BASE_URL: http://127.0.0.1:1004
      SITE_BASE_URL: http://127.0.0.1:1000
      CORE_PORT: 1004
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/infinite_ai?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: infinite-ai
      INTERNAL_JWT_SECRET: change-me-internal-jwt-secret
      COOKIE_HASH_SECRET: change-me-cookie-hash-secret
      MASTER_KEY: 0123456789abcdef0123456789abcdef
      DEFAULT_ADMIN_EMAIL: admin@infinite.local
      DEFAULT_ADMIN_PASSWORD: ChangeThisAdminPassword123!
      DEFAULT_ADMIN_DISPLAY_NAME: Admin Root
      DEFAULT_ADMIN_ROLE: super_admin
      DEFAULT_ADMIN_TOTP_SECRET: JBSWY3DPEHPK3PXP
      DEFAULT_CHAT_ROUTE: infinite-ai-standard
      DEEP_SEARCH_ROUTE: infinite-ai-pro
    depends_on:
      - postgres
      - redis
      - minio
      - searxng
    expose:
      - "1004"

  searxng:
    image: searxng/searxng:latest
    container_name: infinite-ai-searxng
    restart: unless-stopped
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml
    environment:
      SEARXNG_BASE_URL: http://127.0.0.1:1011/
      SEARXNG_SECRET: infinite-ai-local-search-secret
    ports:
      - "1011:8080"

  worker:
    build:
      context: ..
      dockerfile: deploy/go-service.Dockerfile
      args:
        SERVICE_PATH: ./services/worker/cmd/worker
    container_name: infinite-ai-worker
    restart: unless-stopped
    environment:
      APP_ENV: development
      PUBLIC_BASE_URL: http://127.0.0.1:1001
      USER_BASE_URL: http://127.0.0.1:1001
      API_BASE_URL: http://127.0.0.1:1002
      ADMIN_BASE_URL: http://127.0.0.1:1003
      REDEEM_BASE_URL: http://127.0.0.1:1004
      SITE_BASE_URL: http://127.0.0.1:1000
      WORKER_PORT: 1005
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/infinite_ai?sslmode=disable
      REDIS_ADDR: redis:6379
      INTERNAL_JWT_SECRET: change-me-internal-jwt-secret
      COOKIE_HASH_SECRET: change-me-cookie-hash-secret
      MASTER_KEY: 0123456789abcdef0123456789abcdef
      DEFAULT_ADMIN_EMAIL: admin@infinite.local
      DEFAULT_ADMIN_PASSWORD: ChangeThisAdminPassword123!
      DEFAULT_ADMIN_DISPLAY_NAME: Admin Root
      DEFAULT_ADMIN_ROLE: super_admin
      DEFAULT_ADMIN_TOTP_SECRET: JBSWY3DPEHPK3PXP
      WORKER_POLL_INTERVAL: 30s
    depends_on:
      - postgres
      - redis
    ports:
      - "1005:1005"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: infinite-ai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "1006:9000"
      - "1007:9001"

  nats:
    image: nats:2.11-alpine
    container_name: infinite-ai-nats
    command: -js
    ports:
      - "1008:4222"

  postgres:
    image: postgres:16-alpine
    container_name: infinite-ai-postgres
    environment:
      POSTGRES_DB: infinite_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "1009:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: infinite-ai-redis
    ports:
      - "1010:6379"

volumes:
  postgres_data:
